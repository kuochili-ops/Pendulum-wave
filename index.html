<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六擺盪球 - 高質感金屬光澤修正版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* UI 控制面板 */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            width: 280px;
            pointer-events: auto;
            z-index: 100;
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: top left;
        }
        /* 預設收合狀態 */
        #ui-panel.collapsed {
            width: 45px;
            height: 45px;
            padding: 0;
            overflow: hidden;
            background: rgba(20, 20, 20, 0.7);
            border-color: rgba(255,255,255,0.05);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            transition: margin 0.3s;
        }
        #ui-panel.collapsed .panel-header {
            margin: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
        }
        h3 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 1px;
            color: #00ffcc;
            text-shadow: 0 0 8px rgba(0,255,204,0.4);
        }
        #ui-panel.collapsed h3 {
            display: none;
        }
        #btn-toggle-panel {
            background: none;
            border: none;
            color: #00ffcc;
            font-size: 16px;
            cursor: pointer;
            width: auto;
            padding: 5px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        #btn-toggle-panel:hover {
            background: rgba(255,255,255,0.1);
        }
        #ui-panel.collapsed #btn-toggle-panel {
            width: 100%;
            height: 100%;
            font-size: 18px;
            border-radius: 11px;
        }
        .panel-content {
            transition: opacity 0.2s;
            opacity: 1;
        }
        #ui-panel.collapsed .panel-content {
            display: none;
            opacity: 0;
        }
        .control-group {
            margin-bottom: 14px;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
            color: #aaa;
        }
        label span {
            color: #00ffcc;
        }
        select, button {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }
        select:hover, button:hover {
            background: #3a3a3a;
            border-color: #00ffcc;
        }
        input[type="range"] {
            width: 100%;
            margin: 4px 0;
            accent-color: #00ffcc;
        }
        .btn-flex {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button.btn-primary {
            background: #00ffcc;
            color: #111;
            font-weight: bold;
            border: none;
        }
        button.btn-primary:hover {
            background: #00ccaa;
            box-shadow: 0 0 10px rgba(0,255,204,0.5);
        }
        button.btn-toggle {
            background: #333;
            border: 1px solid #555;
        }
        button.btn-toggle.active {
            background: #ff3366;
            color: white;
            border: none;
        }
        /* 音訊開啟提示遮罩 */
        #audio-welcome-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5,5,5,0.85);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: opacity 0.5s ease;
        }
        #audio-welcome-overlay button {
            width: auto;
            padding: 15px 40px;
            font-size: 18px;
            background: #00ffcc;
            color: #111;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(0,255,204,0.4);
        }
        #audio-welcome-overlay p {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #666;
            pointer-events: none;
            letter-spacing: 1px;
            z-index: 90;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="audio-welcome-overlay">
        <button id="btn-start-app">開啟 𓃥 白六擺盪球 (含音效)</button>
        <p>☉ 建議配戴耳機以獲得最佳空間立體聲體驗 ☉</p>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-panel" class="collapsed">
        <div class="panel-header">
            <h3>𓃥 白六擺盪球</h3>
            <button id="btn-toggle-panel" title="收合/展開選單">◣</button>
        </div>
        
        <div class="panel-content">
            <div class="control-group">
                <label>選擇擺盪模式</label>
                <select id="wave-mode">
                    <option value="standard">標準單擺波 (同向同側釋放)</option>
                    <option value="zigzag">交錯鋸齒 (正反兩側釋放)</option>
                    <option value="center">中央擴散 (從中心向兩側漸變)</option>
                    <option value="random">混沌樂章 (隨機初始相位)</option>
                </select>
            </div>

            <div class="control-group">
                <label>球體色彩主題</label>
                <select id="color-theme">
                    <option value="rainbow">經典彩虹漸層</option>
                    <option value="gold">純奢華金 (Metallic Gold)</option>
                    <option value="silver">純太空銀 (Metallic Silver)</option>
                    <option value="emerald">翡翠綠漸層 (Emerald Gradient)</option>
                    <option value="aurora">極光藍紫漸層 (Aurora Borealis)</option>
                    <option value="cyber">賽博霓虹漸層 (Cyberpunk Neon)</option>
                </select>
            </div>

            <div class="control-group">
                <label>擺盪角度 (幅度) <span id="val-amp">30°</span></label>
                <input type="range" id="slide-amp" min="10" max="60" value="30">
            </div>

            <div class="control-group">
                <label>擺索增長比例 <span id="val-growth">1.0x</span></label>
                <input type="range" id="slide-growth" min="0.3" max="2.0" step="0.1" value="1.0">
            </div>

            <div class="control-group">
                <label>擺盪速度快慢 <span id="val-speed">1.0x</span></label>
                <input type="range" id="slide-speed" min="1.0" max="5.0" step="0.2" value="1.0">
            </div>

            <div class="btn-flex">
                <button class="btn-toggle" id="btn-playpause">停止</button>
                <button class="btn-primary" id="btn-reset">重新釋放</button>
            </div>
        </div>
    </div>

    <div id="hint">☉ 畫面可使用單指/滑鼠滑動旋轉視角 ｜ 雙指/滾輪縮放 ☉</div>

    <script>
        // --- Web Audio API 音訊系統建置 ---
        let audioCtx = null;

        const pentatonicScale = [
            130.81, 146.83, 164.81, 196.00, 220.00, 
            261.63, 293.66, 329.63, 392.00, 440.00, 
            523.25, 587.33, 659.25, 783.99, 880.00, 
            1046.50                                 
        ];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTone(frequency, panValue) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0.18, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6); 

            if (panner) {
                panner.pan.setValueAtTime(panValue, audioCtx.currentTime);
                oscillator.connect(gainNode).connect(panner).connect(audioCtx.destination);
            } else {
                oscillator.connect(gainNode).connect(audioCtx.destination);
            }

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.6);
        }

        // --- 基本場景設定 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.001);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
        camera.position.set(90, 40, 100); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0); 
        controls.maxPolarAngle = Math.PI / 2 + 0.1;

        // --- 【核心重構：多維度補光系統】 ---
        // 1. 基底環境光（微弱維持基本暗部細節）
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.25); 
        scene.add(ambientLight);

        // 2. 主頂部主光（帶陰影）
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(80, 200, 60);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 3. 右前側金屬高光補光（關鍵：負責在金、銀球表面打出高光白邊）
        const frontHighlightLight = new THREE.DirectionalLight(0xffffff, 1.2);
        frontHighlightLight.position.set(120, 60, 150);
        scene.add(frontHighlightLight);

        // 4. 左後側環境氛圍光（保留原本的賽博藍綠霓虹感）
        const sideLight = new THREE.DirectionalLight(0x00ffcc, 0.35);
        sideLight.position.set(-150, 80, -50);
        scene.add(sideLight);

        // 5. 正前方極低處向上的逆光（確保球體在正下方翻轉時底部不會死黑）
        const bottomLight = new THREE.PointLight(0xffffff, 0.6, 300);
        bottomLight.position.set(0, -50, 100);
        scene.add(bottomLight);


        // --- 固定物理參數與固定頂桿 ---
        const g = 9.81;                 
        const totalBalls = 16;          
        const spacing = 4.5;            
        const zOffset = -((totalBalls - 1) * spacing) / 2; 

        const barGeo = new THREE.BoxGeometry(2.0, 2.0, totalBalls * spacing + 10);
        const barMat = new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.6 });
        const topBar = new THREE.Mesh(barGeo, barMat);
        topBar.position.set(0, 55, 0); 
        scene.add(topBar);

        const floorGeo = new THREE.PlaneGeometry(1000, 1000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -65;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- 狀態變數 ---
        let bobs = [];
        let isPlaying = true;
        let accumulatedTime = 0; 
        let lastFrameTime = Date.now();

        function getRainbowColor(index, total) {
            const hue = (index / total) * 360;
            return new THREE.Color(`hsl(${hue}, 95%, 55%)`);
        }

        // --- 【優化修正：金銀金屬材質拉絲霧面調校】 ---
        function getBallMaterial(index, total, theme) {
            const matConfig = { metalness: 0.1, roughness: 0.15, color: new THREE.Color() };
            const ratio = index / total;

            switch(theme) {
                case 'gold':
                    // 霧面奢華金：降低原本過高導致吸黑的金屬度，並稍微調高粗糙度捕捉環境高光
                    matConfig.color.setHex(0xfad771); 
                    matConfig.metalness = 0.82; 
                    matConfig.roughness = 0.22; 
                    break;
                case 'silver':
                    // 太空極光銀：高反光白銀色
                    matConfig.color.setHex(0xf0f0f0); 
                    matConfig.metalness = 0.85; 
                    matConfig.roughness = 0.18; 
                    break;
                case 'emerald':
                    matConfig.color.setHSL(0.35 + ratio * 0.1, 0.9, 0.3 + ratio * 0.3); matConfig.roughness = 0.05; break;
                case 'aurora':
                    matConfig.color.setHSL(0.55 + ratio * 0.2, 0.9, 0.5); matConfig.metalness = 0.4; break;
                case 'cyber':
                    matConfig.color.setHex(index % 2 === 0 ? 0xff0055 : 0x00ffcc); matConfig.roughness = 0.1; break;
                case 'rainbow':
                default:
                    matConfig.color.setHSL(ratio * 1.0, 0.95, 0.55); break;
            }
            return new THREE.MeshStandardMaterial(matConfig);
        }

        function createPendulums() {
            bobs.forEach(bob => {
                scene.remove(bob.pivot);
                bob.pivot.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
            });
            bobs = [];

            const mode = document.getElementById('wave-mode').value;
            const theme = document.getElementById('color-theme').value;
            const growthScale = parseFloat(document.getElementById('slide-growth').value); 
            const ampDegrees = parseFloat(document.getElementById('slide-amp').value);
            const maxAmplitude = (ampDegrees * Math.PI) / 180; 

            const T_loop = 60; 
            const baseCount = 6.6; 
            const stepCount = 0.3; 

            const ropeMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.2 });
            const jointMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            for (let i = 0; i < totalBalls; i++) {
                const count = baseCount + (i * stepCount); 
                const T = T_loop / count;    
                const L = g * Math.pow(T / (2 * Math.PI), 2) * growthScale; 

                const pivot = new THREE.Group();
                pivot.position.set(0, topBar.position.y, zOffset + i * spacing);

                const jointGeo = new THREE.SphereGeometry(0.3, 16, 16);
                const joint = new THREE.Mesh(jointGeo, jointMat);
                pivot.add(joint);

                const ropeRadius = 0.12;
                const ropeGeo = new THREE.CylinderGeometry(ropeRadius, ropeRadius, L, 8);
                const rope = new THREE.Mesh(ropeGeo, ropeMat);
                rope.position.set(0, -L / 2, 0); 
                pivot.add(rope);

                const ballRadius = 1.6;
                const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
                const ballMat = getBallMaterial(i, totalBalls, theme);
                
                const ball = new THREE.Mesh(ballGeo, ballMat);
                ball.position.set(0, -L, 0); 
                ball.castShadow = true;
                pivot.add(ball);

                scene.add(pivot);

                let amplitude = maxAmplitude;
                let phaseShift = 0;

                if (mode === 'zigzag') {
                    amplitude = (i % 2 === 0) ? maxAmplitude : -maxAmplitude;
                } else if (mode === 'center') {
                    phaseShift = Math.abs(i - totalBalls/2) * 0.35;
                } else if (mode === 'random') {
                    phaseShift = Math.random() * Math.PI * 2;
                }

                const frequency = pentatonicScale[i] || 440;

                bobs.push({
                    pivot: pivot,
                    omega: (2 * Math.PI) / T, 
                    amplitude: amplitude,
                    phaseShift: phaseShift,
                    frequency: frequency,
                    lastSign: 0 
                });
            }
            
            accumulatedTime = 0;
            lastFrameTime = Date.now();
        }

        function animate() {
            requestAnimationFrame(animate);

            const now = Date.now();
            const speedMultiplier = parseFloat(document.getElementById('slide-speed').value);
            const deltaTime = ((now - lastFrameTime) / 1000) * speedMultiplier;
            lastFrameTime = now;

            if (isPlaying) {
                accumulatedTime += deltaTime;
            }

            bobs.forEach(bob => {
                const angleState = bob.omega * accumulatedTime + bob.phaseShift;
                const theta = bob.amplitude * Math.cos(angleState);
                bob.pivot.rotation.z = theta; 

                if (isPlaying && audioCtx) {
                    const currentSign = Math.sign(Math.sin(angleState));
                    if (bob.lastSign !== 0 && currentSign !== bob.lastSign) {
                        const panVal = Math.max(-1, Math.min(1, bob.pivot.position.z / (totalBalls * spacing / 2)));
                        playTone(bob.frequency, panVal);
                    }
                    bob.lastSign = currentSign;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // --- UI 控制與事件監聽 ---
        const panel = document.getElementById('ui-panel');
        const togglePanelBtn = document.getElementById('btn-toggle-panel');
        
        function updatePanelUI() {
            togglePanelBtn.innerText = panel.classList.contains('collapsed') ? "◣" : "◢";
        }

        togglePanelBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            panel.classList.toggle('collapsed');
            updatePanelUI();
        });

        container.addEventListener('pointerdown', () => {
            if (!panel.classList.contains('collapsed')) {
                panel.classList.add('collapsed');
                updatePanelUI();
            }
        });

        document.getElementById('btn-start-app').addEventListener('click', () => {
            initAudio(); 
            document.getElementById('audio-welcome-overlay').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('audio-welcome-overlay').style.display = 'none';
            }, 500);
        });

        document.getElementById('slide-amp').addEventListener('input', (e) => {
            document.getElementById('val-amp').innerText = e.target.value + "°";
            const maxAmplitude = (parseFloat(e.target.value) * Math.PI) / 180;
            const mode = document.getElementById('wave-mode').value;
            bobs.forEach((bob, i) => {
                bob.amplitude = (mode === 'zigzag' && i % 2 !== 0) ? -maxAmplitude : maxAmplitude;
            });
        });

        document.getElementById('slide-growth').addEventListener('input', (e) => {
            document.getElementById('val-growth').innerText = e.target.value + "x";
            createPendulums(); 
        });

        document.getElementById('slide-speed').addEventListener('input', (e) => {
            document.getElementById('val-speed').innerText = e.target.value + "x";
        });

        document.getElementById('color-theme').addEventListener('change', createPendulums);
        document.getElementById('wave-mode').addEventListener('change', createPendulums);
        document.getElementById('btn-reset').addEventListener('click', createPendulums);

        const playPauseBtn = document.getElementById('btn-playpause');
        playPauseBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playPauseBtn.innerText = "停止";
                playPauseBtn.classList.remove('active');
                lastFrameTime = Date.now(); 
            } else {
                playPauseBtn.innerText = "開始擺盪";
                playPauseBtn.classList.add('active');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        createPendulums();
        animate();
    </script>
</body>
</html>
